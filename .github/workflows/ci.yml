name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # JOB 2: Jest Tests (unit + integration)
  # ─────────────────────────────────────────────
  test-jest:
    name: Jest Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./test.db
      NEXTAUTH_SECRET: test-secret-minimum-32-characters-long-string
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXRlc3RpbmctcHVycG9zZXMtb25seTEyMzQ1Ng==
      CRON_SECRET: test-cron-secret-minimum-32-characters
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema to test DB
        run: npx prisma db push --skip-generate

      - name: Run Jest tests with coverage
        run: npx jest --ci --coverage --maxWorkers=2

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage/

  # ─────────────────────────────────────────────
  # JOB 3: Vitest Tests (server actions)
  # ─────────────────────────────────────────────
  test-vitest:
    name: Vitest Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./test.db
      NEXTAUTH_SECRET: test-secret-minimum-32-characters-long-string
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXRlc3RpbmctcHVycG9zZXMtb25seTEyMzQ1Ng==
      CRON_SECRET: test-cron-secret-minimum-32-characters
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Vitest tests
        run: npx vitest run

  # ─────────────────────────────────────────────
  # JOB 4: Production Build
  # ─────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test-jest, test-vitest]
    env:
      # Use dummy values so Next.js build doesn't crash on missing env vars
      DATABASE_URL: postgresql://user:pass@localhost:5432/timecapsule
      NEXTAUTH_SECRET: ci-build-secret-minimum-32-characters-long
      NEXTAUTH_URL: https://your-production-url.vercel.app
      ENCRYPTION_KEY: dGVzdC1rZXktZm9yLXRlc3RpbmctcHVycG9zZXMtb25seTEyMzQ1Ng==
      CRON_SECRET: ci-build-cron-secret-minimum-32-characters
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to Vercel (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Run post-deploy DB migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
